name: Cypress E2E Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch: # allows manual trigger from GitHub UI
    inputs:
        environment:
            description: 'Target environment'
            required: true
            default: 'staging'
            type: choice
            options:
                - staging
                - local-ephimeral

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cypress-run:
    name: Cypress E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30 # hard kill if tests hang
    environment: ${{ github.event.inputs.environment || 'stagging' }}


    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Debug secrets
        run: |
          echo "Environment: ${{ github.event.inputs.environment || 'staging' }}"
          echo "BASE_URL is set: ${{ secrets.BASE_URL != '' }}"

      - name: Run Cypress tests
        id: cypress
        uses: cypress-io/github-action@v6
        with:
          command: npm run cy:run:full:cicd -- --env BASE_URL=${{ secrets.BASE_URL }}
        continue-on-error: true

      - name: Zip HTML report
        if: always()
        run: zip -r cypress/reports/report.zip cypress/reports/report.html

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-report
          path: cypress/reports/report.zip
          retention-days: 7

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: steps.cypress.outcome == 'failure'
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          retention-days: 7

      - name: Notify Discord
        if: always()
        run: |
          STATUS="${{ steps.cypress.outcome }}"

          if [ "$STATUS" = "success" ]; then
            COLOR="3066993"
            EMOJI="✅"
            LABEL="PASSED"
          else
            COLOR="15158332"
            EMOJI="❌"
            LABEL="FAILED"
          fi

          curl -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"${EMOJI} Cypress E2E — ${LABEL}\",
                \"color\": ${COLOR},
                \"fields\": [
                  { \"name\": \"Branch\", \"value\": \"${{ github.ref_name }}\", \"inline\": true },
                  { \"name\": \"Environment\", \"value\": \"${{ github.event.inputs.environment || 'staging' }}\", \"inline\": true },
                  { \"name\": \"Triggered by\", \"value\": \"${{ github.actor }}\", \"inline\": true },
                  { \"name\": \"Run\", \"value\": \"[View on GitHub](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\" }
                ]
              }]
            }" \
            ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Send report to Discord
        if: always()
        run: |
          curl -F "file=@cypress/reports/report.zip" \
            -F "payload_json={\"content\": \"📎 Full Mochawesome report for run <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}>\"}" \
            ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Fail pipeline if tests failed  # 👈 this is the fix
        if: steps.cypress.outcome == 'failure'
        run: exit 1